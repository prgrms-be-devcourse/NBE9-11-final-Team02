name: CI

on:
  pull_request:
    branches:
      - develop
  push:
    branches:
      - develop
      - main

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-sonar:
    name: Test and SonarCloud Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          java-version: "24"
          distribution: oracle
          cache: gradle

      - name: Grant execute permission for Gradle
        run: chmod +x gradlew

      - name: Validate SonarCloud access
        env:
          SONAR_TOKEN: ${{ secrets.SONARCLOUD_SECRET }}
        run: |
          test -n "$SONAR_TOKEN" || {
            echo "SONAR_TOKEN is not configured"
            exit 1
          }

          echo "Checking token..."
          curl -fsS -u "${SONAR_TOKEN}:" \
            https://sonarcloud.io/api/authentication/validate

          echo ""
          echo "Checking project access..."
          curl -fsS -u "${SONAR_TOKEN}:" \
            "https://sonarcloud.io/api/components/show?component=prgrms-be-devcourse_NBE9-11-final-Team02"

      - name: Run tests and SonarCloud analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONARCLOUD_SECRET }}
        run: |
          ./gradlew clean test sonar \
            -Dsonar.token="$SONAR_TOKEN" \
            --no-daemon