name: deploy

env:
  IMAGE_REPOSITORY: nbe9-11-team02
  CONTAINER_1_NAME: app1_1
  CONTAINER_2_NAME: app1_2
  CONTAINER_PORT: 8080
  EC2_INSTANCE_TAG_NAME: team02-web  # terraform/variables.tf의 prefix + "-web"과 일치해야 함
  DOCKER_NETWORK: common

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    paths:
      - ".github/workflows/**"
      - "src/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "Dockerfile"
    branches:
      - main
      - develop

defaults:
  run:
    shell: bash

jobs:
  calculateTag:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag_name: ${{ steps.dry_run.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: 다음 버전 태그 계산 (dry-run)
        id: dry_run
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          dry_run: true

  buildImageAndPush:
    name: 도커 이미지 빌드와 푸시
    needs: calculateTag
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Docker Buildx 설치
        uses: docker/setup-buildx-action@v3

      - name: 레지스트리 로그인
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 소유자 이름 소문자 변환
        run: |
          echo "OWNER_LC=${OWNER,,}" >> "${GITHUB_ENV}"
        env:
          OWNER: "${{ github.repository_owner }}"

      - name: 빌드 앤 푸시
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/${{ env.IMAGE_REPOSITORY }}:${{ needs.calculateTag.outputs.tag_name }}
            ghcr.io/${{ env.OWNER_LC }}/${{ env.IMAGE_REPOSITORY }}:latest

  deploy:
    name: Blue/Green 무중단 배포
    runs-on: ubuntu-latest
    needs: [calculateTag, buildImageAndPush]
    permissions:
      contents: read
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: 인스턴스 ID 가져오기
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=${{ env.EC2_INSTANCE_TAG_NAME }}" "Name=instance-state-name,Values=running" \
            --query "Reservations[].Instances[].InstanceId" --output text)
          [[ -n "${INSTANCE_ID}" && "${INSTANCE_ID}" != "None" ]] || { echo "No running instance found"; exit 1; }
          echo "INSTANCE_ID=${INSTANCE_ID}" >> "${GITHUB_ENV}"

      - name: Parameter Store에 secret 업로드
        env:
          APPLICATION_SECRET: ${{ secrets.APPLICATION_SECRET }}
        run: |
          [[ -z "$APPLICATION_SECRET" ]] && { echo "❌ APPLICATION_SECRET이 설정되지 않았습니다."; exit 1; }
          aws ssm put-parameter \
            --region "${{ secrets.AWS_REGION }}" \
            --name "/team02/application-secret" \
            --value "$APPLICATION_SECRET" \
            --type "SecureString" \
            --overwrite
          echo "✅ Parameter Store 업로드 완료"

      - name: AWS SSM 배포
        run: |
          DEPLOY_SCRIPT=$(cat << 'SCRIPT_EOF'
            set -Eeuo pipefail

            # Parameter Store에서 시크릿 가져오기
            mkdir -p /home/ec2-user/secrets
            aws ssm get-parameter \
              --name "/team02/application-secret" \
              --with-decryption \
              --query "Parameter.Value" \
              --output text > /home/ec2-user/secrets/application-secret.yaml
            chmod 600 /home/ec2-user/secrets/application-secret.yaml
            echo "✅ Secret 파일 갱신 완료"

            OWNER_LC="${{ github.repository_owner }}"
            OWNER_LC="${OWNER_LC,,}"
            IMAGE_TAG="${{ needs.calculateTag.outputs.tag_name }}"
            IMAGE="ghcr.io/${OWNER_LC}/${{ env.IMAGE_REPOSITORY }}:${IMAGE_TAG}"
            SLOT1="${{ env.CONTAINER_1_NAME }}"
            SLOT2="${{ env.CONTAINER_2_NAME }}"
            PORT_IN="${{ env.CONTAINER_PORT }}"
            NET="${{ env.DOCKER_NETWORK }}"

            echo "이미지 pull: ${IMAGE}"
            docker pull "${IMAGE}"

            if docker ps --format '{{.Names}}' | grep -q "^${SLOT1}$"; then
              BLUE="${SLOT1}"
              GREEN="${SLOT2}"
            else
              BLUE="${SLOT2}"
              GREEN="${SLOT1}"
            fi
            echo "blue(현재): ${BLUE}, green(다음): ${GREEN}"

            docker rm -f "${GREEN}" >/dev/null 2>&1 || true
            docker run -d --name "${GREEN}" \
              --restart unless-stopped \
              --network "${NET}" \
              -e TZ=Asia/Seoul \
              -v /home/ec2-user/secrets/application-secret.yaml:/app/application-secret.yaml:ro \
              "${IMAGE}"

            echo "헬스체크 대기: ${GREEN}"
            TIMEOUT=180
            ELAPSED=8
            sleep 8

            CONTAINER_IP=$(docker inspect --format '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' "${GREEN}")
            while (( ELAPSED < TIMEOUT )); do
              CODE=$(curl -s -o /dev/null -w "%{http_code}" "http://${CONTAINER_IP}:${PORT_IN}/actuator/health" || echo 000)
              [[ "${CODE}" == "200" ]] && { echo "${GREEN} 정상 기동"; break; }
              sleep 5
              ELAPSED=$((ELAPSED + 5))
            done
            [[ "${CODE:-000}" == "200" ]] || { echo "${GREEN} 헬스체크 실패"; docker logs --tail=200 "${GREEN}" || true; docker rm -f "${GREEN}" || true; exit 1; }

            docker stop "${BLUE}" >/dev/null 2>&1 || true
            docker rm "${BLUE}" >/dev/null 2>&1 || true
            echo "이전 컨테이너 제거: ${BLUE}"

            docker image prune -f

            echo "배포 완료. 실행 중: ${GREEN}"
          SCRIPT_EOF
          )

          PARAMS=$(jq -nc --arg s "$DEPLOY_SCRIPT" '{"commands":[$s]}')

          COMMAND_ID=$(aws ssm send-command \
            --region "${{ secrets.AWS_REGION }}" \
            --instance-ids "${{ env.INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters "$PARAMS" \
            --query "Command.CommandId" \
            --output text)
          echo "SSM Command ID: ${COMMAND_ID}"

          WAIT_MAX=900
          WAIT_INTERVAL=10
          WAIT_ELAPSED=0
          while (( WAIT_ELAPSED < WAIT_MAX )); do
            CMD_STATUS=$(aws ssm get-command-invocation \
              --command-id "${COMMAND_ID}" \
              --instance-id "${{ env.INSTANCE_ID }}" \
              --query 'Status' --output text 2>/dev/null || echo "Unknown")
            [[ "${CMD_STATUS}" == "InProgress" || "${CMD_STATUS}" == "Pending" ]] || break
            sleep ${WAIT_INTERVAL}
            WAIT_ELAPSED=$(( WAIT_ELAPSED + WAIT_INTERVAL ))
          done

          INVOCATION=$(aws ssm get-command-invocation \
            --command-id "${COMMAND_ID}" \
            --instance-id "${{ env.INSTANCE_ID }}")
          STATUS=$(echo "$INVOCATION" | jq -r '.Status')

          echo "===== stdout ====="
          echo "$INVOCATION" | jq -r '.StandardOutputContent'
          echo "===== stderr ====="
          echo "$INVOCATION" | jq -r '.StandardErrorContent'
          echo "=================="
          echo "Status: ${STATUS}"

          [[ "$STATUS" == "Success" ]] || exit 1

  makeTagAndRelease:
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: 태그 생성
        id: create_tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: 릴리즈 생성
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.create_tag.outputs.new_tag }}
          name: Release ${{ steps.create_tag.outputs.new_tag }}
          body: ${{ steps.create_tag.outputs.changelog }}
          draft: false
          prerelease: false
