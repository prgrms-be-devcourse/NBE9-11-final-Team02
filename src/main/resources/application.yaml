server:
  port: 8080
  forward-headers-strategy: native

spring:
  application:
    name: NBE9-11-final-Team02

app:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-key-in-production}
    access-token-validity-seconds: ${JWT_ACCESS_TOKEN_VALIDITY_SECONDS:1800}
    refresh-token-validity-seconds: ${JWT_REFRESH_TOKEN_VALIDITY_SECONDS:1209600}
    access-token-cookie-name: ${JWT_ACCESS_COOKIE_NAME:accessToken}
    refresh-token-cookie-name: ${JWT_REFRESH_COOKIE_NAME:refreshToken}
    secure-cookie: ${JWT_SECURE_COOKIE:false}
    same-site: ${JWT_COOKIE_SAME_SITE:Lax}

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    open-in-view: false
  profiles:
    active: dev
    include: secret
  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: always